<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INPUT — An HTML Experiment</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/intro.css" />
</head>
<body>
<div id="intro-page">
  <div class="stage active" id="stage-crash">
    <img class="stage-gif" src="assets/images/car-crash.gif" alt="" />
  </div>
  <div class="stage" id="stage-the-end">
    <img class="stage-gif" src="assets/images/the-end.gif" alt="" />
  </div>
  <div class="stage" id="stage-ascii">
    <img class="stage-gif stage-gif--contain" src="assets/images/ascii-human.gif" alt="" />
  </div>
  <div class="stage" id="stage-data">
    <img class="stage-gif" src="assets/images/data-glitch.gif" alt="" />
  </div>
  <div class="stage" id="stage-pill">
    <img id="pill-image" src="assets/images/pill-choice.jpg" alt="" />
    <div id="pill-inner">
      <div id="pill-input-wrap">
        <div class="intro-label">MAKE YOUR SELECTION</div>
        <input type="text" id="pill-input" placeholder="TYPE RED OR BLUE" maxlength="4" autocomplete="off" spellcheck="false" />
        <div id="pill-warning">⚠ INVALID SELECTION — SYSTEM CANNOT PROCESS</div>
        <div class="intro-hint">PRESS ENTER TO CONFIRM</div>
      </div>
      <div class="intro-hint">[ INPUT INSTANCE 01 / 25 ] &nbsp;|&nbsp; <a href="library.html">COMPONENT LIBRARY</a></div>
    </div>
  </div>
  <div id="flash-overlay"></div>
</div>
<script src="js/intro.js"></script>
</body>
</html>
