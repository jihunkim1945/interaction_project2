<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INPUT — An HTML Experiment</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #intro-page { position: fixed; inset: 0; background: #000; }

    .stage {
      position: absolute; inset: 0;
      background: #000; opacity: 0; pointer-events: none;
    }
    .stage.active { opacity: 1; pointer-events: auto; }

    .stage-gif {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .stage-gif--contain { object-fit: contain; }

    /* ── Skip button — always visible during intro ── */
    #skip-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.3);
      background: transparent; padding: 8px 16px; cursor: pointer;
      display: none; transition: all 0.2s;
    }
    #skip-btn:hover { color: #fff; border-color: #fff; }
    #skip-btn.show { display: block; }

    /* ── Pill stage ── */
    #pill-image {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block; z-index: 0;
    }

    #what-is-real {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      opacity: 0; transition: opacity 0.6s;
      pointer-events: none;
    }
    #what-is-real.show { opacity: 1; }
    #what-is-real span {
      font-family: 'Courier New', monospace;
      font-size: clamp(28px, 5vw, 64px);
      color: #fff; letter-spacing: 0.15em; text-transform: uppercase;
    }

    #pill-inner {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 72px; gap: 18px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      pointer-events: none;
    }
    #pill-inner.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    #pill-input-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      width: 100%; max-width: 320px;
    }

    .intro-label {
      color: rgba(255,255,255,0.9);
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,1);
    }

    #pill-input {
      width: 100%; background: rgba(0,0,0,0.4);
      border: none; border-bottom: 2px solid rgba(255,255,255,0.7);
      color: #fff; font-family: 'Courier New', monospace;
      font-size: 20px; letter-spacing: 0.25em;
      text-align: center; padding: 10px 4px;
      outline: none; caret-color: #00ff41;
      transition: border-color 0.3s, color 0.3s;
    }
    #pill-input:focus { border-color: #fff; }
    #pill-input::placeholder { color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 0.3em; }

    #pill-warning {
      color: #ff3333; font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      opacity: 0; transition: opacity 0.3s; min-height: 16px;
      text-align: center; line-height: 1.6;
      text-shadow: 0 1px 8px rgba(0,0,0,1);
    }
    #pill-warning.show { opacity: 1; }

    .intro-hint {
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
      text-align: center; text-shadow: 0 1px 8px rgba(0,0,0,1);
    }
    .intro-hint a { color: rgba(255,255,255,0.4); text-decoration: none; }
    .intro-hint a:hover { color: rgba(255,255,255,0.8); }

    #flash-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #fff; opacity: 0; pointer-events: none;
    }
  </style>
</head>
<body>
<div id="intro-page">

  <div class="stage active" id="stage-crash">
    <img class="stage-gif" src="assets/images/car-crash.gif" alt="" />
  </div>
  <div class="stage" id="stage-the-end">
    <img class="stage-gif" src="assets/images/the-end.gif" alt="" />
  </div>
  <div class="stage" id="stage-ascii">
    <img class="stage-gif stage-gif--contain" src="assets/images/ascii-human.gif" alt="" />
  </div>
  <div class="stage" id="stage-data">
    <img class="stage-gif" src="assets/images/data-glitch.gif" alt="" />
  </div>

  <div class="stage" id="stage-pill">
    <img id="pill-image" src="assets/images/pill-choice.jpg" alt="" />
    <div id="what-is-real"><span>What is real?</span></div>
    <div id="pill-inner">
      <div id="pill-input-wrap">
        <div class="intro-label">CHOOSE YOUR REALITY</div>
        <input type="text" id="pill-input" placeholder="TYPE RED OR BLUE"
               maxlength="4" autocomplete="off" spellcheck="false" />
        <div id="pill-warning"></div>
        <div class="intro-hint">PRESS ENTER TO CONFIRM</div>
      </div>
      <div class="intro-hint">
        [ INPUT INSTANCE 01 / 25 ] &nbsp;|&nbsp;
        <a href="library.html">COMPONENT LIBRARY</a>
      </div>
    </div>
  </div>

  <button id="skip-btn">SKIP ›</button>
  <div id="flash-overlay"></div>
</div>

<script>
(function () {
  var stages  = [
    document.getElementById('stage-crash'),
    document.getElementById('stage-the-end'),
    document.getElementById('stage-ascii'),
    document.getElementById('stage-data'),
    document.getElementById('stage-pill'),
  ];
  var flash   = document.getElementById('flash-overlay');
  var skipBtn = document.getElementById('skip-btn');
  var current = 0;
  var GIF_MS  = [1900, 2800, 3200, 2600];
  var chainTimer = null;

  function cutTo(next) {
    flash.style.opacity = '1';
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        stages[current].classList.remove('active');
        current = next;
        stages[current].classList.add('active');
        flash.style.opacity = '0';
        if (next === 4) {
          skipBtn.classList.remove('show');
          showPillStage();
        }
      });
    });
  }

  function runChain(i) {
    chainTimer = setTimeout(function () {
      cutTo(i + 1);
      if (i + 1 < 4) runChain(i + 1);
    }, GIF_MS[i]);
  }

  /* Skip button — always shown after 1s */
  setTimeout(function () { skipBtn.classList.add('show'); }, 1000);

  skipBtn.addEventListener('click', function () {
    if (chainTimer) clearTimeout(chainTimer);
    cutTo(4);
  });

  /* Always play intro on every load */
  runChain(0);

  function showPillStage() {
    var whatIsReal = document.getElementById('what-is-real');
    var pillInner  = document.getElementById('pill-inner');
    var pillInput  = document.getElementById('pill-input');

    setTimeout(function () { whatIsReal.classList.add('show'); }, 300);
    setTimeout(function () {
      whatIsReal.style.transition = 'opacity 0.5s';
      whatIsReal.style.opacity = '0';
      setTimeout(function () {
        whatIsReal.style.display = 'none';
        pillInner.classList.add('visible');
        pillInput.focus();
      }, 500);
    }, 2300);
  }

  var input   = document.getElementById('pill-input');
  var warning = document.getElementById('pill-warning');

  input.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var v = input.value.trim().toLowerCase();
    if (v === 'blue') {
      input.style.borderColor = '#3366ff';
      input.style.color = '#3366ff';
      setTimeout(function () { location.href = 'blue.html'; }, 420);
    } else if (v === 'red') {
      input.style.borderColor = '#ff3333';
      input.style.color = '#ff3333';
      setTimeout(function () { location.href = 'red.html'; }, 420);
    } else {
      warning.textContent = 'Input rejected. Choose your reality: RED or BLUE.';
      warning.classList.add('show');
      input.value = '';
      input.style.borderColor = '#ff3333';
      setTimeout(function () {
        warning.classList.remove('show');
        input.style.borderColor = '';
      }, 3000);
    }
  });
})();
</script>
</body>
</html>
